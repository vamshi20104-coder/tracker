<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker Pro</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#000;
  color:white;
  text-align:center;
}

/* Attractive Animated Name */
.username{
  background:linear-gradient(90deg,#7c3aed,#c084fc,#7c3aed);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:900;
  animation:glow 3s linear infinite;
  text-shadow:0 0 15px rgba(192,132,252,0.5);
}

@keyframes glow{
  0%{background-position:0%}
  100%{background-position:200%}
}

h1{margin:15px 0;font-weight:900;}

.days{display:flex;overflow:auto;padding:10px;gap:8px;}

.day{
  padding:10px 16px;
  background:#111;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  flex-shrink:0;
  transition:.3s;
}

.day:hover{background:#222;}
.active{background:#7c3aed;transform:scale(1.05);}

.card{
  background:#111;
  margin:15px;
  padding:15px;
  border-radius:18px;
  text-align:left;
  box-shadow:0 0 15px rgba(124,58,237,.2);
}

.task{margin:8px 0;font-size:17px;}

input[type="checkbox"]{
  transform:scale(1.3);
  margin-right:10px;
  accent-color:#7c3aed;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:15px;
  font-size:14px;
  font-weight:700;
  background:#7c3aed;
  color:white;
  cursor:pointer;
  margin:5px;
}

.streak{font-size:20px;margin-top:10px;}
.level{margin-top:10px;font-size:18px;}

.bar{
  height:18px;
  background:#222;
  border-radius:20px;
  margin-top:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#7c3aed,#c084fc);
  transition:1s;
}

canvas{
  background:#111;
  border-radius:15px;
  margin-top:10px;
}

.quote{
  margin:20px;
  font-size:18px;
  font-weight:600;
  color:#bbb;
}

#nameModal{
 position:fixed;
 inset:0;
 background:#000c;
 display:flex;
 justify-content:center;
 align-items:center;
}

.modalBox{
 background:#111;
 padding:30px;
 border-radius:20px;
}

.modalBox input{
 padding:12px;
 border-radius:12px;
 border:none;
 outline:none;
 width:200px;
 margin-top:10px;
}
</style>
</head>
<body>

<h1 id="title">Study Tracker</h1>
<button onclick="changeName()">Update Name</button>
<button onclick="resetName()">Reset Name</button>

<div class="days" id="days"></div>
<div class="card" id="content"></div>

<div class="card">
<h3>Streak 🔥</h3>
<div class="streak" id="streak"></div>
<div class="level" id="level"></div>
<div class="bar"><div class="fill" id="xpbar"></div></div>
</div>

<div class="card">
<h3>Weekly Progress</h3>
<canvas id="graph" width="300" height="200"></canvas>
</div>

<div class="quote" id="quote"></div>

<div id="nameModal">
 <div class="modalBox">
  <h2>Enter Name</h2>
  <input id="nameInput">
  <br><br>
  <button onclick="saveName()">Start</button>
 </div>
</div>

<script>

/* TIMETABLE */
const data={
Mon:["Morning: Physio","Evening: Physio + Anatomy"],
Tue:["Morning: Physio","Evening: Biochem + Anatomy"],
Wed:["Morning: Biochem","Evening: Physio + Anatomy"],
Thu:["Morning: Anatomy","Evening: Biochem + Anatomy"],
Fri:["Morning: Physio + Anatomy","Evening: Physio + Anatomy"],
Sat:["Morning: Biochem","Evening: Biochem + Anatomy"],
Sun:["Records / Revision"]
}

/* QUOTES */
const quotes=[
"Level up your discipline 🎯",
"Success is built daily 🧱",
"You are upgrading yourself 🚀",
"Focus > Motivation 🧠",
"Consistency = Power ⚡",
"Be better than yesterday 🔥"
]

/* SOUNDS */
const tickSound=new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3")
const winSound=new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3")
const fireworkSound=new Audio("https://assets.mixkit.co/active_storage/sfx/1998/1998-preview.mp3")

/* STORAGE */
let streak=parseInt(localStorage.getItem("streak"))||0
let xp=parseInt(localStorage.getItem("xp"))||0
let level=parseInt(localStorage.getItem("level"))||1
let taskStatus=JSON.parse(localStorage.getItem("taskStatus"))||{}

const streakDiv=document.getElementById("streak")
const levelDiv=document.getElementById("level")
const xpbar=document.getElementById("xpbar")

streakDiv.innerText=streak+" Day Streak 🔥"
levelDiv.innerText="Level "+level
xpbar.style.width=xp+"%"

/* NAME SYSTEM */
const modal=document.getElementById("nameModal")

function setTitle(name){
 document.getElementById("title").innerHTML=
 `Study Tracker — <span class="username">${name}</span>`
}

function saveName(){
 let n=document.getElementById("nameInput").value
 if(!n)return
 localStorage.setItem("name",n)
 modal.style.display="none"
 setTitle(n)
}

function changeName(){
 modal.style.display="flex"
}

function resetName(){
 localStorage.removeItem("name")
 modal.style.display="flex"
 document.getElementById("title").innerHTML="Study Tracker"
}

/* LOAD NAME */
let savedName=localStorage.getItem("name")
if(savedName){
 modal.style.display="none"
 setTitle(savedName)
}

/* DAYS */
const daysDiv=document.getElementById("days")
const content=document.getElementById("content")

Object.keys(data).forEach((d,i)=>{
 let btn=document.createElement("div")
 btn.className="day"
 btn.innerText=d
 btn.onclick=()=>selectDay(d,btn)
 if(i==0){btn.classList.add("active");selectDay(d,btn)}
 daysDiv.appendChild(btn)
})

function selectDay(day,btn){
 document.querySelectorAll(".day").forEach(b=>b.classList.remove("active"))
 btn.classList.add("active")

 content.innerHTML="<h2>"+day+"</h2>"+data[day].map((t,i)=>{
  let checked=taskStatus[day]?.[i]?"checked":""
  return `<div class="task">
  <label>
  <input type="checkbox" data-day="${day}" data-index="${i}" ${checked}
  onchange="checkProgress(this)">
  ${t}
  </label>
  </div>`
 }).join("")
}

/* CHECK TASK */
function checkProgress(el){
 tickSound.play()

 let day=el.dataset.day
 let index=el.dataset.index

 if(!taskStatus[day]) taskStatus[day]=[]
 taskStatus[day][index]=el.checked
 localStorage.setItem("taskStatus",JSON.stringify(taskStatus))

 let checks=document.querySelectorAll(`input[data-day="${day}"]`)
 let done=[...checks].filter(c=>c.checked).length

 if(done===checks.length && checks.length>0){
   if(!localStorage.getItem("done_"+day)){
     streak++
     xp+=20
     fireworkSound.play()

     if(xp>=100){
       xp=0
       level++
       winSound.play()
       fireworkSound.play()
       alert("LEVEL UP 🔥 Level "+level)
     }

     localStorage.setItem("done_"+day,true)
   }

   localStorage.setItem("streak",streak)
   localStorage.setItem("xp",xp)
   localStorage.setItem("level",level)

   streakDiv.innerText=streak+" Day Streak 🔥"
   levelDiv.innerText="Level "+level
   xpbar.style.width=xp+"%"
   drawGraph()
 }
}

/* GRAPH */
function drawGraph(){
 let c=document.getElementById("graph")
 let ctx=c.getContext("2d")
 ctx.clearRect(0,0,c.width,c.height)

 ctx.beginPath()
 ctx.strokeStyle="#7c3aed"
 ctx.lineWidth=4

 let vals=[]
 Object.keys(data).forEach(d=>{
  vals.push(localStorage.getItem("done_"+d)?150:30)
 })

 vals.forEach((v,i)=>{
  let x=i*(c.width/6)
  let y=c.height-v
  if(i==0) ctx.moveTo(x,y)
  else ctx.lineTo(x,y)
 })

 ctx.stroke()
}
drawGraph()

/* RANDOM QUOTE */
document.getElementById("quote").innerText=
quotes[Math.floor(Math.random()*quotes.length)]

</script>
</body>
</html>
